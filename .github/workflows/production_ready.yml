name: AI-f Production Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest trivy
          
      - name: Run Tests
        run: pytest backend/tests
        
      - name: Security Scan (Trivy)
        run: trivy fs . --severity HIGH,CRITICAL
        
      - name: Build Docker Image
        run: docker build -t ai-f-backend:latest backend/
        
      - name: Container Scan
        run: trivy image ai-f-backend:latest --severity HIGH,CRITICAL

  deploy-staging:
    needs: test-and-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to K8s (Staging)
        run: |
          helm upgrade --install ai-f-backend-staging infra/k8s/charts/ai-f-backend --namespace staging --set environment=staging

  deploy-production:
    needs: test-and-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    environment: 
      name: production
      url: https://api.ai-f.com
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to K8s (Production)
        run: |
          helm upgrade --install ai-f-backend-prod infra/k8s/charts/ai-f-backend --namespace production --set environment=production
