name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Lint and Type Check
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort mypy
      - name: Run Black (format check)
        run: black --check backend/ tests/
      - name: Run Flake8 (lint)
        run: flake8 backend/ --max-complexity=10
      - name: Run isort (import order)
        run: isort --check-only backend/
      - name: Run MyPy (type check)
        run: mypy backend/ --ignore-missing-imports

  # Job 2: SBOM Generation
  sbom:
    runs-on: ubuntu-latest
    outputs:
      sbom-file: ${{ steps.sbom.outputs.sbom-file }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/owner/ai-f-backend:latest
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
  
  # Job 3: Security Scanning
  security:
    runs-on: ubuntu-latest
    needs: [lint, sbom]
    steps:
      - uses: actions/checkout@v4
      
      # Dependency scanning
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
      
      # Secret scanning
      - name: Check for secrets
        uses: detect-secrets/detect-secrets-action@v1
        with:
          scan-path: .
          exclude-path: .gitignore

  # Job 4: Unit Tests with Coverage
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      - name: Run pytest with coverage
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=85
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: unittests
          name: codecov-umbrella

  # Job 5: Integration Tests
  integration:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio
      - name: Run integration tests
        run: |
          cd backend
          pytest tests/integration/ -v --tb=short

  # Job 6: Build and Push Docker Image
  build:
    runs-on: ubuntu-latest
    needs: [test, integration, security]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ai-f-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PYTHON_VERSION=3.12

  # Job 7: Deploy to Staging (auto on main)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Deploy to Kubernetes (staging)
        uses: kubectl-action@v1
        with:
          command: apply -k k8s/overlays/staging
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_STAGING }}

  # Job 8: Deploy to Production (manual approval)
  deploy-prod:
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Kubernetes (production)
        uses: kubectl-action@v1
        with:
          command: apply -k k8s/overlays/production
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_PROD }}
      - name: Smoke tests
        run: |
          # Wait for pods to be ready
          kubectl wait --for=condition=ready pod -l app=ai-f-backend -n face-recognition --timeout=300s
          # Run health check
          kubectl exec -it $(kubectl get pod -l app=ai-f-backend -n face-recognition -o jsonpath='{.items[0].metadata.name}') -- curl -f http://localhost:8000/api/health
