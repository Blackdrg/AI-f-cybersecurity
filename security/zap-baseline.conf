---
# OWASP ZAP Baseline Scan
# Run against staging/production URLs for automated security scanning
#
# Usage:
#   zap-baseline.py -t https://staging.example.com -r zap-report.html
#   zap-baseline.py -t https://api.example.com -g gen.conf -r report.html

target: "${{ env.TARGET_URL }}"
# The target URL to scan

rules: "${{ env.ZAP_RULES || '/usr/share/zap/ak/baseline' }}"
# Load baseline rules (includes OWASP Top 10)

# Authentication (if required)
auth:
  method: "header"
  header: "Authorization"
  value: "Bearer ${{ env.API_TOKEN }}"

# Spiders the site, then scans
spider:
  maxDepth: 3
  maxDuration: 5

ajaxSpider:
  maxDuration: 2

scan:
  # Scan policy name (defined in zap.policy)
  policy: "baseline"

# Report settings
report:
  title: "ZAP Security Scan Report"
  theme: "light"
  sections:
    - alert
    - site
    - url
    - summary

# Exclude certain paths
exclude:
  - "^/health$"
  - "^/api/health$"
  - "^/metrics$"
