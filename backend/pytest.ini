[pytest]
# AI-F Backend Test Configuration

# Python path - required for imports
pythonpath = backend

# Test discovery
testpaths = tests tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --capture=no
    -p no:cacheprovider

# Async support
asyncio_mode = auto

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (require real services)
    unit: marks tests as unit tests
    gpu: marks tests requiring GPU
    asyncio: marks tests as async
    benchmark: marks tests as benchmark tests
    accuracy: marks tests as accuracy validation
    billing: marks tests as billing tests
    webhooks: marks tests as webhook tests
    performance: marks tests as performance tests
    validation: marks tests as validation tests
    redis: tests requiring real Redis instance
    stripe: tests using real Stripe API (test mode)
    openai: tests using real OpenAI API
    onnx: tests loading real ONNX models
    pgvector: tests using real pgvector extension
    infra: marks infra-dependent tests
    database: tests requiring real PostgreSQL
    vector_search: tests using FAISS or pgvector search
    models: tests loading real ML models
    slow_integration: slow integration tests
    celery: tests requiring Celery workers
    api_contract: tests validating OpenAPI spec

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
