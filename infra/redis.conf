# Redis Production Configuration - AI-f
# Optimized for JWT revocation, rate limiting, pub/sub, Celery broker, and persistence

# ============================================
# PERSISTENCE (AOF + RDB)
# ============================================
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
rdbcompression yes

# RDB snapshot rules
save 900 1
save 300 10
save 60 10000

# AOF rewrite threshold
aof-rewrite-incremental-fsync yes

# ============================================
# MEMORY MANAGEMENT
# ============================================
maxmemory 2gb
maxmemory-policy allkeys-lru

# ============================================
# SECURITY HARDENING
# ============================================
requirepass "${REDIS_PASSWORD:-redis_pass}"
masterauth "${REDIS_PASSWORD:-redis_pass}"
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
rename-command DEBUG ""
rename-command KEYS "keylist"
rename-command SHUTDOWN "SHUTDOWN_NOW"

# ============================================
# NETWORK
# ============================================
bind 0.0.0.0
protected-mode no
port 6379
tcp-backlog 511
tcp-keepalive 300
timeout 300

# ============================================
# SLOW LOG
# ============================================
slowlog-log-slower-than 10000
slowlog-max-len 128

# ============================================
# LATENCY MONITORING
# ============================================
latency-monitor-threshold 100

# ============================================
# LUA SCRIPTING (for atomic JWT revocation)
# ============================================
lua-time-limit 5000

# ============================================
# CLIENT BUFFERS
# ============================================
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ============================================
# REPLICATION (for sentinel-managed failover)
# ============================================
min-replicas-to-write 1
min-replicas-max-lag 10

# ============================================
# CLUSTER SETTINGS (disabled - using Sentinel)
# ============================================
cluster-enabled no

# ============================================
# CONNECTION LIMITS
# ============================================
maxclients 10000