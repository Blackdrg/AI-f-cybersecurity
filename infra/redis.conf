# Redis configuration for AI-f production

# Persistence - AOF enabled for durability
appendonly yes
appendfilename "redis-aof.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Encryption at rest (requires Redis compiled with encryption support)
# For production with disk encryption, ensure:
# 1. Host-level disk encryption (LUKS, BitLocker, etc.)
# 2. Or use Redis Enterprise with at-rest encryption

# Security
requirepass redis_pass
masterauth redis_pass

# Network
bind 0.0.0.0
protected-mode yes

# Memory management
maxmemory-policy allkeys-lru

# Logging
loglevel notice

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
