# Redis Production Config - Encrypted AOF Persistence
appendonly yes
appendfsync everysec
appendfilename \"redis-aof.aof\"

# Encryption (requirepass already set)
# Disk encryption via AOF + OS level

# Memory optimized for scale
maxmemory 2gb
maxmemory-policy allkeys-lru

# Multi-tenant eviction
# Cluster mode disabled for simplicity (enabled in k8s StatefulSet)

# Lua scripting for auth revocation
lua-time-limit 5000

# Slowlog for monitoring
slowlog-log-slower-than 10000

# Security hardening
rename-command FLUSHALL \"\"
rename-command FLUSHDB \"\"
rename-command CONFIG \"\"
rename-command DEBUG \"\"
rename-command KEYS \"keylist\"
