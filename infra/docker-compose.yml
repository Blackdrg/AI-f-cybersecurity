version: '3.8'

services:
  postgres:
    image: postgres:15.5-bullseye
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-face_recognition}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2.3-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.cpu
      args:
        - USE_GPU=false
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-face_recognition}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      KMS_KEY_ID: ${KMS_KEY_ID:-alias/face-recognition-key}
      USE_GPU: ${USE_GPU:-false}
      # Providers (Enterprise Config)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_...}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - insightface_models:/root/.insightface/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  flower:
    image: python:3.11-slim
    restart: always
    command: celery -A app.main.celery flower --persistent=True -P gevent --port=5555
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "5555:5555"
    volumes:
      - ../backend/app:/app/app
    depends_on:
      - redis
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ui:
    build: ../ui/react-app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ssl_certs:/etc/ssl/certs
      - ssl_private:/etc/ssl/private
    depends_on:
      - backend
      - ui
    command: >
      sh -c "
      openssl req -x509 -nodes -days 365 -newkey rsa:2048
             -keyout /etc/ssl/private/nginx-selfsigned.key
             -out /etc/ssl/certs/nginx-selfsigned.crt
             -subj '/C=US/ST=State/L=City/O=Organization/CN=localhost' &&
      nginx -g 'daemon off;'"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.45.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.cpu
      args:
        - USE_GPU=false
    restart: always
    command: celery -A app.main.celery worker --loglevel=info --concurrency=4
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-face_recognition}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      USE_GPU: ${USE_GPU:-false}
    volumes:
      - ../backend/app:/app/app
      - insightface_models:/root/.insightface/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.main.celery inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile.cpu
    command: celery -A app.main.celery beat --loglevel=info
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      USE_GPU: ${USE_GPU:-false}
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.main.celery inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  ssl_certs:
  ssl_private:
  insightface_models:

# For GPU: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up

