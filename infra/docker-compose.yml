version: '3.8'

services:
  postgres:
    image: postgres:15.5-bullseye
    environment:
      POSTGRES_DB: face_recognition
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:7.2.3-alpine
    ports:
      - "6379:6379"

  backend:
    build: ../backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: face_recognition
      JWT_SECRET: secret
      ENCRYPTION_KEY: your-32-byte-secret-key-here123456789012
      AWS_REGION: us-east-1
      KMS_KEY_ID: alias/face-recognition-key
      # Providers (Enterprise Config)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_...}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - insightface_models:/root/.insightface/models
    depends_on:
      - postgres
      - redis

  ui:
    build: ../ui/react-app
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ssl_certs:/etc/ssl/certs
      - ssl_private:/etc/ssl/private
    depends_on:
      - backend
      - ui
    command: >
      sh -c "
      openssl req -x509 -nodes -days 365 -newkey rsa:2048
             -keyout /etc/ssl/private/nginx-selfsigned.key
             -out /etc/ssl/certs/nginx-selfsigned.crt
             -subj '/C=US/ST=State/L=City/O=Organization/CN=localhost' &&
      nginx -g 'daemon off;'"

  prometheus:
    image: prom/prometheus:v2.45.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  celery-worker:
    build: ../backend
    command: celery -A app.main.celery worker --loglevel=info --concurrency=4
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: face_recognition
      REDIS_URL: redis://redis:6379
      JWT_SECRET: secret
      ENCRYPTION_KEY: your-32-byte-secret-key-here123456789012
    volumes:
      - ../backend/app:/app/app
      - insightface_models:/root/.insightface/models
    depends_on:
      - postgres
      - redis

  celery-beat:
    build: ../backend
    command: celery -A app.main.celery beat --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  ssl_certs:
  ssl_private:
  insightface_models:
