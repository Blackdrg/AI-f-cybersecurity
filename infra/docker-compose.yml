# Docker Compose for AI-F (version auto-detected, no version key needed)

services:
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: face_recognition
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      # Tune max_connections for 10k RPS load testing / production scaling
      # HPA can scale to 50 pods; each pod uses ~10-15 connections
      # Set to 500-1000 depending on instance size
      MAX_CONNECTIONS: ${PG_MAX_CONNECTIONS:-500}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_pgvector.sql:/docker-entrypoint-initdb.d/01-pgvector.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres && psql -U postgres -d face_recognition -tAc \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5432:5432"
    command: >
      postgres
      -c max_connections=${PG_MAX_CONNECTIONS:-500}
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=16MB

  redis-master:
    image: redis:7.2.3-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfilename "redis-master.aof"
      --dir /data
      --requirepass "${REDIS_PASSWORD:-redis_pass}"
      --masterauth "${REDIS_PASSWORD:-redis_pass}"
      --appendfsync everysec
      --no-appendfsync-on-rewrite no
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --rdbcompression yes
      --save 60 1
    volumes:
      - redis_master_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  
  redis-replica:
    image: redis:7.2.3-alpine
    restart: unless-stopped
    command: redis-server --replicaof redis-master 6379 --requirepass "${REDIS_PASSWORD:-redis_pass}" --masterauth "${REDIS_PASSWORD:-redis_pass}"
    volumes:
      - redis_replica_data:/data
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "6380:6379"

   backend:
     build: ../backend
     restart: unless-stopped
     environment:
       DB_HOST: postgres
       DB_PORT: 5432
       DB_USER: postgres
       DB_PASSWORD: ${DB_PASSWORD:-password}
       DB_NAME: face_recognition
       # Tuned connection pool for horizontal scaling
       DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-10}
       DB_POOL_MIN_SIZE: ${DB_POOL_MIN_SIZE:-2}
       DB_REPLICA_POOL_MAX: ${DB_REPLICA_POOL_MAX:-5}
       DB_REPLICA_POOL_MIN: ${DB_REPLICA_POOL_MIN:-2}
       REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis-master:6379/0
       JWT_SECRET: ${JWT_SECRET:-secret}
       ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-32-byte-secret-key-here123456789012}
       AWS_REGION: us-east-1
       KMS_KEY_ID: alias/face-recognition-key
       STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_...}
       OPENAI_API_KEY: ${OPENAI_API_KEY:-}
       BING_API_KEY: ${BING_API_KEY:-}
       FRONTEND_URL: http://localhost:3000
       ONNX_BUNDLE_PATH: /models/onnx_bundle
       IN_DOCKER: 'true'
    ports:
      - "8000:8000"
    volumes:
      - insightface_models:/root/.insightface/models
      - ../backend/models/onnx_bundle:/models/onnx_bundle:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  ui:
    build: ../ui/react-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  enclave:
    image: ai-f-enclave:eif
    restart: unless-stopped
    # Note: In production, run via nitro-cli run-enclave, not Docker
    # This is for local mock/development
    build:
      context: ../../enclave
      dockerfile: Dockerfile.eif
    ports:
      - "5000:5000"  # VSOCK mapped to TCP for mock
    volumes:
      - enclave_data:/secure-data
    environment:
      - KNOWN_FACE_EMBEDDINGS_PATH=/secure-data/known_face_embeddings.npy
    networks:
      - enclave-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ssl_certs:/etc/ssl/certs
      - ssl_private:/etc/ssl/private
    depends_on:
      - backend
      - ui
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    command: >
      sh -c "
      openssl req -x509 -nodes -days 365 -newkey rsa:2048
             -keyout /etc/ssl/private/nginx-selfsigned.key
             -out /etc/ssl/certs/nginx-selfsigned.crt
             -subj '/C=US/ST=State/L=City/O=Organization/CN=localhost' &&
      nginx -g 'daemon off;'"

  prometheus:
    image: prom/prometheus:v2.45.0
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  celery-worker:
    build: ../backend
    restart: unless-stopped
    command: celery -A app.celery worker --loglevel=info -Q celery,faiss_sync
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: face_recognition
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis-master:6379/0
      JWT_SECRET: ${JWT_SECRET:-secret}
      ENCLAVE_VSOCK_CID: 3
      ENCLAVE_VSOCK_PORT: 5000

    volumes:
      - ../backend/models/onnx_bundle:/models/onnx_bundle:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      backend:
        condition: service_started
      enclave:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  faiss:
    image: faiss/faiss:latest
    restart: unless-stopped
    command: faiss_index_server /faiss/index --host 0.0.0.0 --port 50051 --enable-grpc
    volumes:
      - faiss_index:/faiss/index
    ports:
      - "50051:50051"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_master_data:
  redis_replica_data:
  faiss_index:
  ssl_certs:
  ssl_private:
  insightface_models:
  enclave_data:

networks:
  enclave-net:
