backend:
  enabled: true
  replicaCount: 3
  image:
    repository: ai-f/backend
    tag: "latest"
    pullPolicy: Always
  gpu: true
  # Tuned connection pool for 10k+ RPS scaling:
  # HPA scales to 50 pods; conservative pool=10 connections per pod → 500 total
  env:
    - name: DB_POOL_MAX_SIZE
      value: "10"
    - name: DB_POOL_MIN_SIZE
      value: "2"
    - name: DB_REPLICA_POOL_MAX
      value: "5"
    - name: DB_REPLICA_POOL_MIN
      value: "2"
  resources:
    limits:
      cpu: 4
      memory: 8Gi
      nvidia.com/gpu: 1
    requests:
      cpu: 1
      memory: 2Gi

redis:
  enabled: true
  password: "change-me-prod"

postgres:
  enabled: true

faiss:
  enabled: true
  replicaCount: 2

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: ai-f.example.com
      paths:
        - path: /
          pathType: Prefix

canary:
  enabled: true
  weight: 20

hpa:
  backend:
    minReplicas: 3
  faiss:
    minReplicas: 2
