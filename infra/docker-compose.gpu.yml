version: '3.8'

include:
  - docker-compose.yml

services:
  backend:
    profiles: ["gpu"]
    build:
      context: ../backend
      dockerfile: Dockerfile.gpu
      args:
        - USE_GPU=true
    environment:
      USE_GPU: true

  celery-worker:
    profiles: ["gpu"]
    build:
      context: ../backend
      dockerfile: Dockerfile.gpu
      args:
        - USE_GPU=true
    environment:
      USE_GPU: true

  celery-beat:
    profiles: ["gpu"]
    build:
      context: ../backend
      dockerfile: Dockerfile.gpu
    environment:
      USE_GPU: true

# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up backend
