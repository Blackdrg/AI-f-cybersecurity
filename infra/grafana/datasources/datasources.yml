# Grafana Datasource Provisioning
# Place in /etc/grafana/provisioning/datasources/
apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: face_recognition
    user: ai_f_user
    secureJsonData:
      password: ${DB_PASSWORD}
    jsonData:
      postgresVersion: 1500
      sslmode: disable

  - name: Redis
    type: redis-datasource
    access: proxy
    url: redis://redis-master:6379
    secureJsonData:
      password: ${REDIS_PASSWORD}

  - name: CloudWatch
    type: grafana-piechart-panel
    access: proxy
    isDefault: false
    editable: true