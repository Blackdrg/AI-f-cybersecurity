apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-network-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: face-recognition-backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from UI pods
  - from:
    - podSelector:
        matchLabels:
          app: face-recognition-ui
    ports:
    - protocol: TCP
      port: 8000
  # Allow traffic from Monitoring (Prometheus)
  - from:
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 8000
  egress:
  # Allow traffic to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow traffic to Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow traffic to AWS services (KMS, Secrets Manager, S3)
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0 # Restricted by AWS IAM, but better than nothing
    ports:
    - protocol: TCP
      port: 443
  # Allow DNS resolution
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
