apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  serviceName: redis
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
    spec:
      containers:
      - name: redis
        image: redis:7.2.3-alpine
        command:
        - redis-server
        - /usr/local/etc/redis/redis.conf
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: password
        ports:
        - name: redis
          containerPort: 6379
        volumeMounts:
        - name: datadir
          mountPath: /data
        readinessProbe:
          exec:
            command:
            - redis-cli
            - --raw
            - ping
        # Resource limits for predictable performance
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 1000m
            memory: 4Gi
  volumeClaimTemplates:
  - metadata:
      name: datadir
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 20Gi
      # StorageClass with encryption at rest (e.g., gp3 with encryption, or encrypted CSI driver)
      # In AWS EKS, gp3 volumes support encryption by default via KMS
      # To explicitly request encrypted volume, add storageClassName: "encrypted-gp3" (if defined)
      # See infra/terraform/main.tf for encrypted storage class
---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
spec:
  clusterIP: None
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app.kubernetes.io/name: redis
