replicaCount: 3

image:
  repository: ai-f-backend
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8000
  grpcPort: 50051

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
    nvidia.com/gpu: 1
  requests:
    cpu: 1000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

env:
  SECRETS_BACKEND: "vault"
  VAULT_URL: "http://vault.secrets:8200"
  OTLP_ENDPOINT: "http://jaeger-collector.observability:4317"
