apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: ai-f
spec:
  replicas: 3
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
       containers:
       - name: postgres
         image: pgvector/pgvector:pg15
         env:
         - name: POSTGRES_DB
           value: face_recognition
         - name: POSTGRES_USER
           value: postgres
         - name: POSTGRES_PASSWORD
           valueFrom:
             secretKeyRef:
               name: postgres-secret
               key: password
         # PostgreSQL tuning for 10k+ RPS with 50-pod HPA
         # max_connections = 500-1000 depending on instance size
         # Each pod uses ~10 connections → 50 pods = 500; add buffer for admin/health checks
         command:
         - postgres
         - -c
         - max_connections=500
         - -c
         - shared_buffers=256MB
         - -c
         - effective_cache_size=1GB
         - -c
         - work_mem=16MB
         - -c
         - maintenance_work_mem=128MB
         - -c
         - wal_buffers=16MB
         volumeMounts:
         - name: postgres-storage
           mountPath: /var/lib/postgresql/data
         - name: init-scripts
           mountPath: /docker-entrypoint-initdb.d
         resources:
           requests:
             cpu: 2
             memory: 4Gi
           limits:
             cpu: 4
             memory: 8Gi
         ports:
         - containerPort: 5432
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: init-scripts
        configMap:
          name: pgvector-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
  clusterIP: None  # Headless for pgpool
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
