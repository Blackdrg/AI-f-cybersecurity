# =============================================================================
# AI-f Main Docker Compose (Development/Testing with full production-like stack)
# =============================================================================
version: '3.8'

services:
  # ===========================================================================
  # POSTGRESQL 15 + pgvector
  # ===========================================================================
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: face_recognition
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      MAX_CONNECTIONS: ${PG_MAX_CONNECTIONS:-500}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_pgvector.sql:/docker-entrypoint-initdb.d/01-pgvector.sql
      - ../alembic/versions/20260513_add_performance_indexes.py:/docker-entrypoint-initdb.d/02-indexes.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres && psql -U postgres -d face_recognition -tAc 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres
      -c max_connections=${PG_MAX_CONNECTIONS:-500}
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=16MB

  # ===========================================================================
  # POSTGRESQL REPLICA
  # ===========================================================================
  postgres-replica:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: face_recognition
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s

  # ===========================================================================
  # REDIS MASTER + REPLICA + SENTINEL
  # ===========================================================================
  redis-master:
    image: redis:7.2.3-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfilename "redis-master.aof"
      --requirepass "${REDIS_PASSWORD:-redis_pass}"
      --masterauth "${REDIS_PASSWORD:-redis_pass}"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --slowlog-log-slower-than 10000
    volumes:
      - redis_master_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis-replica:
    image: redis:7.2.3-alpine
    restart: unless-stopped
    command: redis-server --replicaof redis-master 6379 --requirepass "${REDIS_PASSWORD:-redis_pass}" --masterauth "${REDIS_PASSWORD:-redis_pass}"
    volumes:
      - redis_replica_data:/data
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "6380:6379"

  redis-sentinel:
    image: redis:7.2.3-alpine
    restart: unless-stopped
    command: >
      redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./redis-sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      - redis-master
      - redis-replica
    ports:
      - "26379:26379"

  # ===========================================================================
  # BACKEND API SERVER
  # ===========================================================================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: face_recognition
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-10}
      DB_POOL_MIN_SIZE: ${DB_POOL_MIN_SIZE:-2}
      DB_REPLICA_POOL_MAX: ${DB_REPLICA_POOL_MAX:-5}
      DB_REPLICA_POOL_MIN: ${DB_REPLICA_POOL_MIN:-2}
      DB_READ_REPLICAS: "postgres-replica:5432"
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis-master:6379/0
      REDIS_SENTINEL_MASTER: "mymaster"
      REDIS_SENTINEL_HOSTS: "redis-sentinel:26379"
      JWT_SECRET: ${JWT_SECRET:-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-32-byte-secret-key-here123456789012}
      AWS_REGION: us-east-1
      KMS_KEY_ID: alias/face-recognition-key
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_...}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FRONTEND_URL: http://localhost:3000
      ONNX_BUNDLE_PATH: /models/onnx_bundle
      IN_DOCKER: 'true'
      PROMETHEUS_ENABLED: 'true'
    ports:
      - "8000:8000"
      - "8001:8001"  # Metrics endpoint
    volumes:
      - insightface_models:/root/.insightface/models
      - ../backend/models/onnx_bundle:/models/onnx_bundle:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ===========================================================================
  # CELERY WORKERS (Main - Recognition)
  # ===========================================================================
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A app.celery worker
      --loglevel=info
      --concurrency=4
      --pool=prefork
      --queues=celery,recognition
      --hostname=worker@%h
      --max-tasks-per-child=1000
      --time-limit=300
      --soft-time-limit=270
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: face_recognition
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis-master:6379/0
      JWT_SECRET: ${JWT_SECRET:-secret}
      ENCLAVE_VSOCK_CID: 3
      ENCLAVE_VSOCK_PORT: 5000
    volumes:
      - ../backend/models/onnx_bundle:/models/onnx_bundle:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================================================
  # CELERY WORKERS (Background - Training, Enrichment)
  # ===========================================================================
  celery-worker-bg:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A app.celery worker
      --loglevel=info
      --concurrency=2
      --pool=prefork
      --queues=enrichment,training,federated,maintenance
      --hostname=worker-bg@%h
      --max-tasks-per-child=500
      --time-limit=1200
      --soft-time-limit=1140
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: face_recognition
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis-master:6379/0
      JWT_SECRET: ${JWT_SECRET:-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================================================
  # CELERY BEAT (Periodic Tasks)
  # ===========================================================================
  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A app.celery beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler
      --schedule=/data/celerybeat-schedule.db
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: face_recognition
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis-master:6379/0
    volumes:
      - celery_beat_data:/data
    depends_on:
      - redis-master
      - postgres

  # ===========================================================================
  # CELERY FLOWER (Task Monitoring)
  # ===========================================================================
  celery-flower:
    image: mher/flower:2.0.1
    restart: unless-stopped
    command: >
      celery flower
      --broker=redis://:${REDIS_PASSWORD:-redis_pass}@redis-master:6379/0
      --port=5555
    ports:
      - "5555:5555"
    environment:
      FLOWER_BASIC_AUTH: ${FLOWER_AUTH:-admin:flower123}
    depends_on:
      - redis-master

  # ===========================================================================
  # FAISS Vector Server
  # ===========================================================================
  faiss:
    image: faiss/faiss:latest
    restart: unless-stopped
    command: faiss_index_server /faiss/index --host 0.0.0.0 --port 50051 --enable-grpc
    volumes:
      - faiss_index:/faiss/index
    ports:
      - "50051:50051"
    depends_on:
      - backend

  # ===========================================================================
  # PROMETHEUS (Metrics Collection)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'

  # ===========================================================================
  # GRAFANA (Dashboards)
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.2.0
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-grafana123}
    depends_on:
      - prometheus

  # ===========================================================================
  # NGINX (Reverse Proxy)
  # ===========================================================================
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ssl_certs:/etc/ssl/certs
      - ssl_private:/etc/ssl/private
    depends_on:
      - backend
      - ui
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    command: >
      sh -c "
      openssl req -x509 -nodes -days 365 -newkey rsa:2048
             -keyout /etc/ssl/private/nginx-selfsigned.key
             -out /etc/ssl/certs/nginx-selfsigned.crt
             -subj '/C=US/ST=State/L=City/O=Organization/CN=localhost' &&
      nginx -g 'daemon off;'"

  # ===========================================================================
  # UI (React Frontend)
  # ===========================================================================
  ui:
    build: ../ui/react-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # ENCLAVE (Secure Processing)
  # ===========================================================================
  enclave:
    image: ai-f-enclave:eif
    restart: unless-stopped
    build:
      context: ../../enclave
      dockerfile: Dockerfile.eif
    ports:
      - "5000:5000"
    volumes:
      - enclave_data:/secure-data
    environment:
      - KNOWN_FACE_EMBEDDINGS_PATH=/secure-data/known_face_embeddings.npy
    networks:
      - enclave-net

volumes:
  postgres_data:
  postgres_replica_data:
  redis_master_data:
  redis_replica_data:
  faiss_index:
  ssl_certs:
  ssl_private:
  insightface_models:
  enclave_data:
  celery_beat_data:
  grafana_data:

networks:
  enclave-net:
