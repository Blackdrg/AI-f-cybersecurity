global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ai-f-production'
    environment: 'production'

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Backend API (Prometheus client from FastAPI/Starlette)
  - job_name: 'face-recognition-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend-api'
    scrape_interval: 10s

  # PgPool-II stats
  - job_name: 'pgpool'
    static_configs:
      - targets: ['pgpool:9999']
    metrics_path: '/pgpool'

  # PostgreSQL exporter
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']
    metrics_path: '/metrics'

  # Redis exporter
  - job_name: 'redis'
    static_configs:
      - targets:
        - 'redis-master:9121'
        - 'redis-replica1:9121'
        - 'redis-replica2:9121'
    metrics_path: '/metrics'

  # Celery exporter (flower metrics)
  - job_name: 'celery'
    static_configs:
      - targets: ['celery-flower:5555']
    metrics_path: '/metrics'

  # NGINX status
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']
    metrics_path: '/status'

  # Node/system metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Blackbox exporter
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - 'http://backend:8000/healthz'
        - 'http://postgres:5432'
    scrape_interval: 30s

  # Grafana self-monitoring
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
