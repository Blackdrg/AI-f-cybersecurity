apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: face-recognition-staging

bases:
  - ../../base

patchesStrategicMerge:
  - patches/deployment.yaml
  - patches/hpa.yaml
  - patches/ingress.yaml

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - LOG_LEVEL=WARNING
      - ENVIRONMENT=staging
      - DB_SSL_MODE=require
      - CORS_ORIGINS=https://staging.example.com
      - RATE_LIMIT_ENABLED=true
      - METRICS_ENABLED=true

secretGenerator:
  - name: app-secrets
    envs:
      - secrets-staging.env
    type: Opaque
