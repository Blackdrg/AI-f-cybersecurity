apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# All resources are applied in order
resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml
  - ingress.yaml

# Common labels for all resources
commonLabels:
  app: ai-f
  tier: backend

# Name prefix
namePrefix: ai-f-

# Secret generator (local dev only - use external-secrets in prod)
generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: app-secrets
    namespace: face-recognition
    envs:
      - secrets.env
    type: Opaque
