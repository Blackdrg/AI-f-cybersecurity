---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: ai-f-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-f-backend
  template:
    metadata:
      labels:
        app: ai-f-backend
    spec:
      serviceAccountName: ai-f-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: ghcr.io/owner/ai-f-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 50051
              name: grpc
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: 1
            requests:
              cpu: "2"
              memory: "8Gi"
          volumeMounts:
            - name: models
              mountPath: /app/models
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: models-pvc
        - name: tmp
          emptyDir: {}
